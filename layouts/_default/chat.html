{{- define "main" }}
<style>
.post-title, .post-description { display: none; }
.footer { display: none !important; }
.main { max-width: 100% !important; padding: 0 !important; min-height: auto !important; }

/* ── Layout ─────────────────────────────────────────────── */
.chat-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  height: calc(100dvh - var(--header-height, 60px));
  overflow: hidden;
}

/* ── Chat header bar ─────────────────────────────────────── */
.chat-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.65rem 1.25rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 0.75rem;
}
.chat-topbar-left {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.chat-topbar-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.chat-topbar-info { line-height: 1.2; }
.chat-topbar-name {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--primary);
  margin: 0;
}
.chat-topbar-status {
  font-size: 0.72rem;
  color: #16a34a;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.chat-topbar-status::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }
.chat-topbar-right { display: flex; gap: 0.5rem; align-items: center; }
.chat-topbar-btn {
  padding: 0.3rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--entry);
  color: var(--primary);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  transition: all 0.2s;
}
.chat-topbar-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.chat-topbar-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.powered-badge {
  font-size: 0.7rem;
  color: var(--secondary);
  padding: 0.2rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--entry);
  white-space: nowrap;
}

/* ── Messages area ───────────────────────────────────────── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem 1rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  scroll-behavior: smooth;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  box-sizing: border-box;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.chat-messages::-webkit-scrollbar { display: none; }

/* ── Empty state ─────────────────────────────────────────── */
.chat-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 0.6rem;
  padding: 2rem 1rem;
  text-align: center;
  pointer-events: none;
  user-select: none;
}
.chat-empty-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  margin-bottom: 0.25rem;
}
.chat-empty-title {
  margin: 0;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--primary);
}
.chat-empty-sub {
  margin: 0;
  font-size: 0.88rem;
  color: var(--primary);
  max-width: 300px;
  line-height: 1.55;
}
.chat-empty-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  max-width: 380px;
  margin-top: 0.5rem;
  pointer-events: auto;
}
.chat-empty-topic {
  font-size: 0.78rem;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--entry);
  color: var(--primary);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.18s;
}
.chat-empty-topic:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Messages ────────────────────────────────────────────── */
.message {
  display: flex;
  gap: 0.6rem;
  max-width: 86%;
  animation: msgIn 0.25s ease-out;
}
@keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }

.message-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  margin-top: 2px;
}
.message.user .message-avatar { background: var(--accent); color: #fff; }
.message.assistant .message-avatar { overflow: hidden; border: 1px solid var(--border); }
.message.assistant .message-avatar img { width: 100%; height: 100%; object-fit: cover; }

.message-content { display: flex; flex-direction: column; gap: 0.2rem; }
.message.user .message-content { align-items: flex-end; }

.message-bubble {
  padding: 0.7rem 0.95rem;
  border-radius: 14px;
  line-height: 1.65;
  font-size: 0.91rem;
  word-wrap: break-word;
  max-width: 100%;
}
.message.user .message-bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .message-bubble {
  background: var(--entry);
  color: var(--primary);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.message-bubble p { margin: 0 0 0.45rem; }
.message-bubble p:last-child { margin-bottom: 0; }
.message-bubble a { text-decoration: underline; text-underline-offset: 2px; }
.message.assistant .message-bubble p,
.message.assistant .message-bubble li,
.message.assistant .message-bubble h3,
.message.assistant .message-bubble h4 { color: var(--primary); }
.message.assistant .message-bubble a { color: var(--accent); }
.message.user .message-bubble p,
.message.user .message-bubble li { color: #fff; }
.message.user .message-bubble a { color: rgba(255,255,255,0.9); }
.message-bubble strong { font-weight: 700; }
.message-bubble ul, .message-bubble ol { margin: 0.35rem 0; padding-left: 1.4rem; }
.message-bubble li { margin-bottom: 0.3rem; line-height: 1.55; }
.message-bubble li:last-child { margin-bottom: 0; }
.message-bubble h3, .message-bubble h4 { margin: 0.5rem 0 0.2rem; font-weight: 700; font-size: 0.97rem; }
.message-bubble h3:first-child, .message-bubble h4:first-child { margin-top: 0; }
.message-bubble code { background: var(--tertiary); padding: 0.12rem 0.35rem; border-radius: 3px; font-size: 0.83em; }
.message.user .message-bubble code { background: rgba(255,255,255,0.18); }

.message-time {
  font-size: 0.68rem;
  color: var(--secondary);
  padding: 0 0.25rem;
  opacity: 0.8;
}

/* ── Typing indicator ────────────────────────────────────── */
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--secondary);
  animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%,60%,100% { opacity:0.3; transform:translateY(0); }
  30% { opacity:1; transform:translateY(-4px); }
}

/* ── Input area ──────────────────────────────────────────── */
.chat-input-area {
  padding: 0.6rem 1rem 1.5rem;
  width: 100%;
  box-sizing: border-box;
  flex-shrink: 0;
}
.chat-input-wrapper {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  background: var(--entry);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 0.5rem 0.5rem 0.5rem 1rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  transition: border-color 0.2s, box-shadow 0.2s;
  box-sizing: border-box;
}
.chat-input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(180,83,9,0.1);
}
.chat-input-inner { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-input {
  flex: 1;
  padding: 0.2rem 0;
  border: none;
  background: transparent;
  color: var(--primary);
  font-size: 0.92rem;
  font-family: inherit;
  resize: none;
  outline: none;
  max-height: 160px;
  min-height: 28px;
  line-height: 1.55;
  box-sizing: border-box;
}
.chat-input::placeholder { color: var(--secondary); opacity: 0.7; }
.chat-char-counter {
  font-size: 0.68rem;
  color: var(--secondary);
  text-align: right;
  padding-right: 0.25rem;
  line-height: 1;
  margin-top: 2px;
  opacity: 0;
  transition: opacity 0.2s;
}
.chat-char-counter.show { opacity: 1; }
.chat-char-counter.warn { color: #f59e0b; }
.chat-char-counter.limit { color: #ef4444; }
.chat-send-btn {
  width: 34px; height: 34px;
  border: none; border-radius: 50%;
  background: var(--primary);
  color: var(--theme, #fff);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s, transform 0.1s, background 0.2s;
  flex-shrink: 0;
  margin-left: 0.5rem;
  align-self: flex-end;
}
.chat-send-btn:hover:not(:disabled) { opacity: 0.82; }
.chat-send-btn:active { transform: scale(0.93); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.chat-send-btn svg { width: 15px; height: 15px; }

/* ── Error & retry ───────────────────────────────────────── */
.error-message {
  color: #dc2626;
  font-size: 0.83rem;
  text-align: center;
  padding: 0.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
}
.retry-btn {
  padding: 0.3rem 0.7rem;
  border: 1px solid #dc2626;
  border-radius: 6px;
  background: transparent;
  color: #dc2626;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.retry-btn:hover { background: #dc2626; color: #fff; }

/* ── Dark mode ───────────────────────────────────────────── */
.dark .chat-input-wrapper { background: #0a0a0a; border-color: #27272a; }
.dark .chat-input-wrapper:focus-within { border-color: var(--accent); }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 600px) {
  .message { max-width: 92%; }
  .chat-topbar { padding: 0.5rem 0.85rem; }
  .powered-badge { display: none; }
  .suggested-btn { font-size: 0.75rem; padding: 0.38rem 0.7rem; }
  .chat-input-area { padding: 0.5rem 0.75rem 1.25rem; }
}
</style>

<div class="chat-container">

  <!-- Top bar -->
  <div class="chat-topbar">
    <div class="chat-topbar-left">
      <img src="/assets/profile-1.webp" alt="Muhammad Ali Sajid" class="chat-topbar-avatar">
      <div class="chat-topbar-info">
        <p class="chat-topbar-name">Ali's AI Assistant</p>
        <span class="chat-topbar-status">Online · Powered by Gemini</span>
      </div>
    </div>
    <div class="chat-topbar-right">
      <span class="powered-badge">Gemini 2.5 Flash</span>
      <button class="chat-topbar-btn" id="newChatBtn" title="Start new conversation">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div class="chat-empty-state" id="chatEmptyState">
    <img src="/assets/profile-1.webp" alt="Muhammad Ali Sajid" class="chat-empty-avatar">
    <h2 class="chat-empty-title">Muhammad Ali Sajid</h2>
    <p class="chat-empty-sub">Shopify Developer &amp; AFA. Ask me anything about my work, skills, or how to hire me.</p>
    <div class="chat-empty-topics">
      <button class="chat-empty-topic" onclick="askSuggested(this)">Shopify stores</button>
      <button class="chat-empty-topic" onclick="askSuggested(this)">Hire me</button>
      <button class="chat-empty-topic" onclick="askSuggested(this)">My projects</button>
      <button class="chat-empty-topic" onclick="askSuggested(this)">Finance background</button>
      <button class="chat-empty-topic" onclick="askSuggested(this)">Contact</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <div class="chat-input-inner">
        <textarea class="chat-input" id="chatInput" placeholder="Ask me anything about Ali's work..." rows="1" maxlength="1000"></textarea>
        <span class="chat-char-counter" id="charCounter">0 / 1000</span>
      </div>
      <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 12 7-7 7 7"/><path d="M12 19V5"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
(function () {
  const chatMessages   = document.getElementById('chatMessages');
  const chatInput      = document.getElementById('chatInput');
  const sendBtn        = document.getElementById('sendBtn');
  const emptyState     = document.getElementById('chatEmptyState');
  const newChatBtn     = document.getElementById('newChatBtn');
  const charCounter    = document.getElementById('charCounter');

  let isGenerating = false;
  let conversationHistory = [];
  let lastFailedMessage = null;

  const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3001/api/chat'
    : '/api/chat';

  /* ── Char counter ──────────────────────────────────────── */
  chatInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    const len = this.value.length;
    charCounter.textContent = len + ' / 1000';
    charCounter.className = 'chat-char-counter' +
      (len > 0 ? ' show' : '') +
      (len > 850 ? ' warn' : '') +
      (len >= 1000 ? ' limit' : '');
  });

  /* ── Enter to send ─────────────────────────────────────── */
  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── New chat ──────────────────────────────────────────── */
  newChatBtn.addEventListener('click', function () {
    if (isGenerating) return;
    conversationHistory = [];
    lastFailedMessage = null;
    chatMessages.innerHTML = '';
    emptyState.style.display = '';
    chatInput.value = '';
    chatInput.style.height = 'auto';
    charCounter.className = 'chat-char-counter';
    chatInput.focus();
  });

  /* ── Markdown parser ───────────────────────────────────── */
  function parseMarkdown(text) {
    function inline(s) {
      s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
      s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      s = s.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g,'<em>$1</em>');
      s = s.replace(/(?<!_)_([^_]+)_(?!_)/g,'<em>$1</em>');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      return s;
    }
    var lines = text.split('\n'), html = '', inUl = false, inOl = false, para = [];
    function flushP() { if (para.length) { html += '<p>' + para.join('<br>') + '</p>'; para = []; } }
    function closeLists() { if (inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} }
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      if (!t) { flushP(); closeLists(); continue; }
      var m;
      if ((m = t.match(/^###\s+(.+)/))) { flushP(); closeLists(); html += '<h4>'+inline(m[1])+'</h4>'; continue; }
      if ((m = t.match(/^##\s+(.+)/)))  { flushP(); closeLists(); html += '<h3>'+inline(m[1])+'</h3>'; continue; }
      if ((m = t.match(/^[-*]\s+(.+)/))) {
        flushP(); if(inOl){html+='</ol>';inOl=false;} if(!inUl){html+='<ul>';inUl=true;}
        html += '<li>'+inline(m[1])+'</li>'; continue;
      }
      if ((m = t.match(/^\d+\.\s+(.+)/))) {
        flushP(); if(inUl){html+='</ul>';inUl=false;} if(!inOl){html+='<ol>';inOl=true;}
        html += '<li>'+inline(m[1])+'</li>'; continue;
      }
      closeLists(); para.push(inline(t));
    }
    flushP(); closeLists();
    return html;
  }

  /* ── Scroll to bottom ──────────────────────────────────── */
  function scrollBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

  /* ── Timestamp ─────────────────────────────────────────── */
  function getTime() {
    var d = new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  /* ── Add message ───────────────────────────────────────── */
  function addMessage(role, content) {
    var wrap = document.createElement('div');
    wrap.className = 'message ' + role;

    var avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    if (role === 'assistant') {
      avatar.innerHTML = '<img src="/assets/profile-1.webp" alt="Muhammad Ali">';
    } else {
      avatar.textContent = 'You';
    }

    var contentWrap = document.createElement('div');
    contentWrap.className = 'message-content';

    var bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    if (role === 'assistant') {
      bubble.innerHTML = parseMarkdown(content);
    } else {
      bubble.innerHTML = '<p>' + content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
    }

    var time = document.createElement('span');
    time.className = 'message-time';
    time.textContent = getTime();

    contentWrap.appendChild(bubble);
    contentWrap.appendChild(time);
    wrap.appendChild(avatar);
    wrap.appendChild(contentWrap);
    chatMessages.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  /* ── Typing indicator ──────────────────────────────────── */
  function showTyping() {
    var wrap = document.createElement('div');
    wrap.className = 'message assistant';
    wrap.id = 'typingMsg';
    var avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.innerHTML = '<img src="/assets/profile-1.webp" alt="Muhammad Ali">';
    var bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatMessages.appendChild(wrap);
    scrollBottom();
  }
  function hideTyping() { var el = document.getElementById('typingMsg'); if (el) el.remove(); }

  /* ── Error ─────────────────────────────────────────────── */
  function showError(text) {
    var div = document.createElement('div');
    div.className = 'error-message';
    var span = document.createElement('span');
    span.textContent = '⚠ ' + text;
    div.appendChild(span);
    if (lastFailedMessage) {
      var btn = document.createElement('button');
      btn.className = 'retry-btn';
      btn.textContent = 'Try again';
      var msg = lastFailedMessage;
      btn.onclick = function () { div.remove(); chatInput.value = msg; sendMessage(); };
      div.appendChild(btn);
    }
    chatMessages.appendChild(div);
    scrollBottom();
  }

  /* ── Suggested / topic click ───────────────────────────── */
  window.askSuggested = function (btn) {
    chatInput.value = btn.textContent.trim();
    sendMessage();
  };

  /* ── Send message ──────────────────────────────────────── */
  window.sendMessage = async function () {
    var message = chatInput.value.trim();
    if (!message || isGenerating) return;

    lastFailedMessage = message;
    if (emptyState) emptyState.style.display = 'none';

    addMessage('user', message);

    chatInput.value = '';
    chatInput.style.height = 'auto';
    charCounter.className = 'chat-char-counter';

    isGenerating = true;
    sendBtn.disabled = true;
    chatInput.disabled = true;

    showTyping();

    try {
      var resp = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message, history: conversationHistory.slice(-10) })
      });

      conversationHistory.push({ role: 'user', content: message });
      hideTyping();

      if (!resp.ok) {
        var errData = await resp.json().catch(function(){ return { error: 'Something went wrong' }; });
        showError(errData.error || 'Failed to get a response. Please try again.');
        return;
      }

      var reader  = resp.body.getReader();
      var decoder = new TextDecoder();
      var fullText = '', bubble = null, buf = '';

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          var data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            var parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              if (!bubble) { bubble = addMessage('assistant', fullText); }
              else { bubble.innerHTML = parseMarkdown(fullText); }
              scrollBottom();
            }
          } catch(e) {}
        }
      }

      if (fullText) {
        conversationHistory.push({ role: 'assistant', content: fullText });
        lastFailedMessage = null;
      } else if (!bubble) {
        showError('No response received. Please try again.');
      }

    } catch (err) {
      hideTyping();
      showError(err.name === 'TypeError' ? 'Network error — check your connection.' : 'Something went wrong. Please try again.');
      console.error('Chat error:', err);
    } finally {
      isGenerating = false;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }
  };

  chatInput.focus();
})();
</script>
{{- end }}
