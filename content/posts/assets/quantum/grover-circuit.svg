  <rect x="90" y="153" width="35" height="34" rx="5" fill="#aaaaaa" fill-opacity="0.08" stroke="#111111" stroke-width="1.5"/>
  <text x="108" y="175" fill="#111111" font-family="monospace" font-size="14" text-anchor="middle" font-weight="bold">H</text>
