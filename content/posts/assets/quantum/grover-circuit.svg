  <rect x="410" y="310" width="300" height="55" rx="6" fill="#e8e8e8" stroke="#999999" stroke-width="1"/>
  <text x="560" y="335" fill="#111111" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">Quantum: O(&#x221A;N)</text>
  <text x="560" y="353" fill="#777777" font-family="monospace" font-size="10" text-anchor="middle">Quadratic speedup via interference</text>
