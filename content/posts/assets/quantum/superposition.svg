    <text x="470" y="225" fill="#333333" font-family="monospace" font-size="12" text-anchor="middle">|011&#x27E9;  &#x3B1;=0.125</text>
    <text x="470" y="248" fill="#777777" font-family="monospace" font-size="12" text-anchor="middle">&#x22EE;</text>
