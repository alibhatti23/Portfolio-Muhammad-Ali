  <text x="145" y="175" fill="#222222" font-family="monospace" font-size="14" text-anchor="middle">1</text>
  <rect x="55" y="200" width="50" height="30" rx="4" fill="none" stroke="#222222" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="80" y="220" fill="#222222" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.4">0</text>
  <rect x="120" y="200" width="50" height="30" rx="4" fill="none" stroke="#222222" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="145" y="220" fill="#222222" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.4">1</text>
  <text x="120" y="265" fill="#777777" font-family="monospace" font-size="11" text-anchor="middle">n bits =</text>
