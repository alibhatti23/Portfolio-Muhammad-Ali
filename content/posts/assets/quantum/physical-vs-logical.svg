<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  
  <rect width="700" height="400" fill="#ffffff" rx="12"/>
  <text x="350" y="32" fill="#111111" font-family="monospace" font-size="15" text-anchor="middle" font-weight="bold">Physical vs Logical Qubits</text>
  <text x="350" y="50" fill="#777777" font-family="monospace" font-size="11" text-anchor="middle">Why 1000 physical qubits are needed per logical qubit</text>
  <rect x="30" y="70" width="230" height="170" rx="10" fill="#e0e0e0" stroke="#222222" stroke-width="1.5"/>
  <text x="145" y="92" fill="#222222" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">Physical Qubit</text>
  <text x="145" y="108" fill="#777777" font-family="monospace" font-size="9" text-anchor="middle">(hardware level)</text>
  <text x="50" y="135" fill="#000000" font-family="monospace" font-size="9">&#x2717; Noisy (0.1-1% error)</text>
  <text x="50" y="152" fill="#000000" font-family="monospace" font-size="9">&#x2717; Short coherence (&#x3BC;s-ms)</text>
  <text x="50" y="169" fill="#000000" font-family="monospace" font-size="9">&#x2717; Gate errors accumulate</text>
  <text x="50" y="186" fill="#000000" font-family="monospace" font-size="9">&#x2717; Decoherence from env</text>
  <text x="50" y="203" fill="#000000" font-family="monospace" font-size="9">&#x2717; Measurement ~1-5% error</text>
  <text x="145" y="228" fill="#777777" font-family="monospace" font-size="9" text-anchor="middle">Current: 100-1000 available</text>
  <text x="345" y="140" fill="#444444" font-family="monospace" font-size="24" text-anchor="middle">&#xD7;1000</text>
  <text x="345" y="160" fill="#777777" font-family="monospace" font-size="10" text-anchor="middle">error correction</text>
  <text x="345" y="175" fill="#777777" font-family="monospace" font-size="10" text-anchor="middle">overhead</text>
  <rect x="440" y="70" width="230" height="170" rx="10" fill="#d5d5d5" stroke="#111111" stroke-width="1.5"/>
  <text x="555" y="92" fill="#111111" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">Logical Qubit</text>
  <text x="555" y="108" fill="#777777" font-family="monospace" font-size="9" text-anchor="middle">(error-corrected)</text>
  <text x="460" y="135" fill="#111111" font-family="monospace" font-size="9">&#x2713; Reliable (&#x226A;1% error)</text>
  <text x="460" y="152" fill="#111111" font-family="monospace" font-size="9">&#x2713; Long effective coherence</text>
  <text x="460" y="169" fill="#111111" font-family="monospace" font-size="9">&#x2713; Errors detected and fixed</text>
  <text x="460" y="186" fill="#111111" font-family="monospace" font-size="9">&#x2713; Preserves superposition</text>
  <text x="460" y="203" fill="#111111" font-family="monospace" font-size="9">&#x2713; Measurement via stabilizers</text>
  <text x="555" y="228" fill="#777777" font-family="monospace" font-size="9" text-anchor="middle">Needed: ~4000 for Shor</text>
  <rect x="30" y="260" width="640" height="125" rx="10" fill="#e8e8e8" stroke="#999999" stroke-width="1"/>
  <text x="350" y="285" fill="#111111" font-family="monospace" font-size="13" text-anchor="middle" font-weight="bold">The Math Behind the Overhead</text>
  <text x="60" y="310" fill="#222222" font-family="monospace" font-size="11">Shor&#x27;s algorithm (2048-bit RSA):</text>
  <text x="80" y="328" fill="#777777" font-family="monospace" font-size="10">&#x2248; 4000 logical qubits required</text>
  <text x="80" y="344" fill="#777777" font-family="monospace" font-size="10">&#x2248; 1000 physical per logical (at 0.1% error)</text>
  <text x="80" y="360" fill="#444444" font-family="monospace" font-size="10" font-weight="bold">= ~4 million physical qubits total</text>
  <text x="420" y="310" fill="#111111" font-family="monospace" font-size="11">Current state of the art:</text>
  <text x="440" y="328" fill="#777777" font-family="monospace" font-size="10">IBM 1121 qubits (2024)</text>
  <text x="440" y="344" fill="#777777" font-family="monospace" font-size="10">Google ~1000 qubits (2024)</text>
  <text x="440" y="360" fill="#000000" font-family="monospace" font-size="10" font-weight="bold">Gap: ~4000x physical qubits</text>
  <text x="350" y="392" fill="#999999" font-family="monospace" font-size="9" text-anchor="middle">Better physical error rates reduce overhead exponentially</text>
</svg>